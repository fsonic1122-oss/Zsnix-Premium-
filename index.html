<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsnix Studio - Pro Web</title>
    <style>
        :root {
            --bg: #0a0c10;
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --owner-color: #ff007a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Login Overlay */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-user { background: var(--accent); color: #000; }
        .btn-owner { background: var(--owner-color); color: #fff; }

        /* Main Content */
        .header {
            padding: 15px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .container { padding: 15px; }

        .admin-panel {
            background: rgba(255, 0, 122, 0.1);
            border: 1px dashed var(--owner-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none; /* Hide by default */
        }

        .variation-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .v-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: white;
        }

        .v-card img { width: 40px; height: 40px; border-radius: 8px; }
        .v-price { color: #fbbf24; font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--accent);">ZSNIX LOGIN</h2>
        <input type="text" id="username" placeholder="နာမည်ရိုက်ပါ">
        <input type="password" id="password" placeholder="Password (Owner သာ)">
        <button class="btn-user" onclick="login('user')">User အနေနဲ့ဝင်မည်</button>
        <button class="btn-owner" onclick="login('owner')">Owner အနေနဲ့ဝင်မည်</button>
    </div>
</div>

<div class="header">
    <div id="display-name">Guest</div>
    <div style="color: var(--accent); font-weight: bold;">ZSNIX STORE</div>
    <button onclick="location.reload()" style="width: auto; padding: 5px 10px; font-size: 10px;">Logout</button>
</div>

<div class="container">
    <div id="admin-panel" class="admin-panel">
        <h4 style="margin: 0; color: var(--owner-color);">Owner Dashboard</h4>
        <p style="font-size: 12px;">ဈေးနှုန်းပြင်ရန် သို့မဟုတ် ပစ္စည်းတင်ရန်</p>
        <button style="background: #333; color: white; font-size: 11px;">+ ပစ္စည်းအသစ်ထည့်မည်</button>
    </div>

    <h3 style="font-size: 14px; border-left: 3px solid var(--accent); padding-left: 10px;">Available Premium Apps</h3>
    
    <div class="variation-grid">
        <a href="https://t.me/Zsnix_Rix" class="v-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
            <span style="font-size: 10px; display: block;">TG Premium</span>
            <span class="v-price">53,000 Ks</span>
        </a>
        <a href="https://t.me/Zsnix_Rix" class="v-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png">
            <span style="font-size: 10px; display: block;">Netflix</span>
            <span class="v-price">5,500 Ks</span>
        </a>
        <a href="https://t.me/Zsnix_Rix" class="v-card">
            <img src="https://static.vecteezy.com/system/resources/previews/016/716/454/original/capcut-icon-free-png.png">
            <span style="font-size: 10px; display: block;">CapCut Pro</span>
            <span class="v-price">4,500 Ks</span>
        </a>
    </div>
</div>

<script>
    function login(role) {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === "") {
            alert("နာမည်ရိုက်ထည့်ပါ!");
            return;
        }

        if (role === 'owner') {
            if (pass === "zsnix123") { // Owner Password က zsnix123 ပါ
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('display-name').innerText = "Owner: " + user;
            } else {
                alert("Owner Password မှားနေပါတယ်!");
            }
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('display-name').innerText = "User: " + user;
        }
    }
</script>

</body>
</html>
