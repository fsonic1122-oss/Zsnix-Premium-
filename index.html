<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsnix Studio - Dynamic Store</title>
    <style>
        :root { --bg: #0d1117; --glass: #161b22; --accent: #00f2ff; --owner: #ff007a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Header */
        .header { padding: 15px; background: #010409; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .balance { border: 1px solid #30363d; padding: 5px 12px; border-radius: 6px; font-size: 14px; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--glass); padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #30363d; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-user { background: var(--accent); color: #000; }
        .btn-owner { background: var(--owner); color: #fff; }

        /* Admin Panel */
        #admin-panel { background: #1c101d; border: 1px solid var(--owner); margin: 15px; padding: 15px; border-radius: 12px; display: none; }

        /* Grid Layout */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: var(--glass); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #30363d; position: relative; }
        .card img { width: 45px; height: 45px; border-radius: 10px; margin-bottom: 5px; }
        .card-name { font-size: 10px; display: block; height: 25px; overflow: hidden; }
        .card-price { color: #fbbf24; font-size: 11px; font-weight: bold; }
        .buy-link { text-decoration: none; color: white; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; border: none; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--accent);">ZSNIX STUDIO</h2>
        <input type="text" id="username" placeholder="Enter Name">
        <input type="password" id="password" placeholder="Password (for Owner)">
        <button class="btn btn-user" onclick="handleLogin('user')">User Login</button>
        <button class="btn btn-owner" onclick="handleLogin('owner')">Owner Login</button>
    </div>
</div>

<div class="header">
    <div class="balance">0 ကျပ်</div>
    <div id="user-display" style="font-weight: bold; color: var(--accent);">Guest</div>
    <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#888; border-radius:4px; font-size:10px;">Logout</button>
</div>

<div id="admin-panel">
    <h4 style="margin:0 0 10px 0; color:var(--owner);">Owner Controls</h4>
    <input type="text" id="new-app-name" placeholder="App Name (e.g. Netflix)">
    <input type="text" id="new-app-price" placeholder="Price (e.g. 5000)">
    <input type="text" id="new-app-img" placeholder="Image URL (Link)">
    <button class="btn-owner" style="padding:8px; border-radius:5px; width:100%;" onclick="addApp()">+ ပစ္စည်းအသစ်ထည့်မည်</button>
    <p style="font-size: 10px; color: #888; margin-top: 10px;">* ပစ္စည်းဖျက်ချင်ရင် ကဒ်ဘေးက (x) ကိုနှိပ်ပါ။</p>
</div>

<div class="container">
    <h3 style="font-size: 14px; border-left: 3px solid var(--accent); padding-left: 10px;">PREMIUM APPS</h3>
    <div class="grid" id="product-grid">
        </div>
</div>

<script>
    let currentRole = 'user';
    let apps = JSON.parse(localStorage.getItem('zsnix_apps')) || [
        { name: "Telegram Premium", price: "53000", img: "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" },
        { name: "Netflix Premium", price: "5500", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" }
    ];

    function handleLogin(role) {
        const name = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if(!name) return alert("နာမည်ထည့်ပါ");

        if(role === 'owner') {
            if(pass === "zsnix123") {
                currentRole = 'owner';
                document.getElementById('admin-panel').style.display = 'block';
            } else { return alert("Password မှားယွင်းနေပါသည်။"); }
        }
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('user-display').innerText = name;
        renderApps();
    }

    function renderApps() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        apps.forEach((app, index) => {
            grid.innerHTML += `
                <div class="card">
                    <button class="delete-btn" style="display:${currentRole === 'owner' ? 'block' : 'none'}" onclick="deleteApp(${index})">x</button>
                    <a href="https://t.me/Zsnix_Rix?text=${app.name} ဝယ်ချင်လို့ပါ" class="buy-link">
                        <img src="${app.img}">
                        <span class="card-name">${app.name}</span>
                        <span class="card-price">${app.price} Ks</span>
                    </a>
                </div>
            `;
        });
    }

    function addApp() {
        const name = document.getElementById('new-app-name').value;
        const price = document.getElementById('new-app-price').value;
        const img = document.getElementById('new-app-img').value || "https://via.placeholder.com/100";

        if(name && price) {
            apps.push({ name, price, img });
            localStorage.setItem('zsnix_apps', JSON.stringify(apps));
            renderApps();
            alert("ပစ္စည်းအသစ် ထည့်ပြီးပါပြီ။");
        }
    }

    function deleteApp(index) {
        if(confirm("ဖျက်မှာ သေချာပါသလား?")) {
            apps.splice(index, 1);
            localStorage.setItem('zsnix_apps', JSON.stringify(apps));
            renderApps();
        }
    }

    // Initial Load
    renderApps();
</script>

</body>
</html>
